<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Viewer — Gaussian Splat</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2e3345;
    --text: #e4e6f0;
    --text-dim: #8b8fa3;
    --accent: #6c63ff;
    --green: #4ade80;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Top Bar ──────────────────────────────────────────── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.75rem 1.5rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .topbar h1 {
    font-size: 1.1rem;
    font-weight: 600;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .topbar-actions { display: flex; gap: 0.75rem; align-items: center; }
  .topbar a, .topbar button {
    padding: 0.4rem 1rem;
    border-radius: 6px;
    font-size: 0.85rem;
    cursor: pointer;
    text-decoration: none;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    transition: all 0.2s;
  }
  .topbar a:hover, .topbar button:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  /* ── Viewer Area ──────────────────────────────────────── */
  .viewer-container {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #000;
  }
  #viewer-canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* ── Loading overlay ──────────────────────────────────── */
  .loading-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(15, 17, 23, 0.92);
    z-index: 10;
    transition: opacity 0.5s;
  }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .loading-spinner {
    width: 48px; height: 48px;
    border: 4px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 1.5rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 1rem; color: var(--text-dim); }
  .loading-progress {
    width: 300px;
    height: 4px;
    background: var(--surface);
    border-radius: 2px;
    margin-top: 1rem;
    overflow: hidden;
  }
  .loading-progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s;
    width: 0%;
  }

  /* ── Info Panel ───────────────────────────────────────── */
  .info-panel {
    position: absolute;
    bottom: 1.5rem;
    left: 1.5rem;
    background: rgba(26, 29, 39, 0.9);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    font-size: 0.8rem;
    color: var(--text-dim);
    backdrop-filter: blur(12px);
    z-index: 5;
    max-width: 300px;
  }
  .info-panel h3 {
    font-size: 0.85rem;
    color: var(--text);
    margin-bottom: 0.5rem;
  }
  .info-panel .info-row {
    display: flex;
    justify-content: space-between;
    padding: 0.15rem 0;
  }
  .info-panel .info-val { color: var(--green); font-weight: 500; }

  /* ── Controls help ────────────────────────────────────── */
  .controls-hint {
    position: absolute;
    top: 1rem;
    right: 1rem;
    background: rgba(26, 29, 39, 0.85);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    font-size: 0.75rem;
    color: var(--text-dim);
    backdrop-filter: blur(8px);
    z-index: 5;
    line-height: 1.7;
  }
  .controls-hint kbd {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0.1rem 0.35rem;
    font-size: 0.7rem;
    color: var(--text);
  }

  /* ── File selector ────────────────────────────────────── */
  .file-select {
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }
  .file-select select {
    padding: 0.4rem 0.6rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 0.85rem;
  }
</style>
</head>
<body>

<div class="topbar">
  <h1>✦ 3D Gaussian Splat Viewer</h1>
  <div class="topbar-actions">
    <div class="file-select">
      <label style="font-size:0.8rem; color:var(--text-dim);">Model:</label>
      <select id="modelSelect"></select>
    </div>
    <a href="/">← Back to Pipeline</a>
    <button id="btnFullscreen">⛶ Fullscreen</button>
  </div>
</div>

<div class="viewer-container" id="viewerContainer">
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text" id="loadingText">Loading 3D model...</div>
    <div class="loading-progress"><div class="loading-progress-bar" id="loadingBar"></div></div>
  </div>

  <canvas id="viewer-canvas"></canvas>

  <div class="controls-hint" id="controlsHint">
    <strong>Controls</strong><br>
    <kbd>Left Drag</kbd> Rotate &nbsp;
    <kbd>Right Drag</kbd> Pan<br>
    <kbd>Scroll</kbd> Zoom &nbsp;
    <kbd>R</kbd> Reset view
  </div>

  <div class="info-panel" id="infoPanel" style="display:none;">
    <h3>Scene Info</h3>
    <div class="info-row"><span>Points</span><span class="info-val" id="infoPoints">—</span></div>
    <div class="info-row"><span>File size</span><span class="info-val" id="infoSize">—</span></div>
    <div class="info-row"><span>Format</span><span class="info-val" id="infoFormat">—</span></div>
  </div>
</div>

<!-- Three.js for PLY viewing -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/PLYLoader.js"></script>

<script>
const JOB_ID = "{{ job_id }}";
let scene, camera, renderer, controls, pointCloud;

// ═══ Init Three.js ═══════════════════════════════════════════════
function initScene() {
  const container = document.getElementById("viewerContainer");
  const canvas    = document.getElementById("viewer-canvas");

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0f1117);

  camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.01, 1000);
  camera.position.set(0, 1, 3);

  renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setSize(container.clientWidth, container.clientHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.screenSpacePanning = true;
  controls.minDistance = 0.1;
  controls.maxDistance = 100;

  // Lights
  scene.add(new THREE.AmbientLight(0xffffff, 0.8));
  const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
  dirLight.position.set(5, 10, 5);
  scene.add(dirLight);

  // Grid
  const grid = new THREE.GridHelper(10, 20, 0x2e3345, 0x1a1d27);
  scene.add(grid);

  // Axes
  scene.add(new THREE.AxesHelper(1));

  window.addEventListener("resize", () => {
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "r" || e.key === "R") {
      controls.reset();
      camera.position.set(0, 1, 3);
    }
  });

  animate();
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

// ═══ Load PLY ════════════════════════════════════════════════════
function loadPLY(url, fileName) {
  const overlay = document.getElementById("loadingOverlay");
  const bar     = document.getElementById("loadingBar");
  const text    = document.getElementById("loadingText");
  overlay.classList.remove("hidden");
  text.textContent = `Loading ${fileName}...`;
  bar.style.width = "0%";

  // Remove previous model
  if (pointCloud) {
    scene.remove(pointCloud);
    pointCloud.geometry.dispose();
    pointCloud.material.dispose();
  }

  const loader = new THREE.PLYLoader();
  const xhr    = new XMLHttpRequest();
  xhr.open("GET", url, true);
  xhr.responseType = "arraybuffer";

  xhr.onprogress = (e) => {
    if (e.lengthComputable) {
      const pct = Math.round((e.loaded / e.total) * 100);
      bar.style.width = pct + "%";
      text.textContent = `Loading ${fileName}... ${pct}%`;
    }
  };

  xhr.onload = () => {
    if (xhr.status === 200) {
      try {
        const geometry = loader.parse(xhr.response);
        geometry.computeVertexNormals();

        let material;
        if (geometry.attributes.color) {
          material = new THREE.PointsMaterial({
            size: 0.005,
            vertexColors: true,
            sizeAttenuation: true,
          });
        } else {
          material = new THREE.PointsMaterial({
            size: 0.005,
            color: 0x60a5fa,
            sizeAttenuation: true,
          });
        }

        pointCloud = new THREE.Points(geometry, material);

        // Center the model
        geometry.computeBoundingBox();
        const center = new THREE.Vector3();
        geometry.boundingBox.getCenter(center);
        pointCloud.position.sub(center);

        // Scale to fit
        const box = geometry.boundingBox;
        const maxDim = Math.max(
          box.max.x - box.min.x,
          box.max.y - box.min.y,
          box.max.z - box.min.z
        );
        if (maxDim > 10) {
          const scale = 5 / maxDim;
          pointCloud.scale.set(scale, scale, scale);
        }

        scene.add(pointCloud);

        // Update info
        const numPoints = geometry.attributes.position.count;
        document.getElementById("infoPoints").textContent = numPoints.toLocaleString();
        document.getElementById("infoFormat").textContent = fileName.split(".").pop().toUpperCase();
        document.getElementById("infoPanel").style.display = "block";

        // Position camera
        const dist = maxDim > 10 ? 5 : maxDim * 1.5;
        camera.position.set(0, dist * 0.5, dist);
        controls.target.set(0, 0, 0);
        controls.update();

        overlay.classList.add("hidden");
      } catch (e) {
        text.textContent = "Error parsing PLY: " + e.message;
      }
    } else {
      text.textContent = "Failed to load file (HTTP " + xhr.status + ")";
    }
  };

  xhr.onerror = () => { text.textContent = "Network error loading file"; };
  xhr.send();
}

// ═══ Populate model dropdown & load ══════════════════════════════
async function init() {
  initScene();

  try {
    const res   = await fetch(`/api/jobs/${JOB_ID}/exports`);
    const files = await res.json();
    const select = document.getElementById("modelSelect");
    select.innerHTML = "";

    const plyFiles = files.filter(f => f.name.endsWith(".ply"));
    if (plyFiles.length === 0) {
      select.innerHTML = '<option>No PLY files found</option>';
      document.getElementById("loadingText").textContent = "No 3D model files found in exports.";
      return;
    }

    plyFiles.forEach((f, i) => {
      const opt = document.createElement("option");
      opt.value = f.url;
      opt.textContent = `${f.name} (${f.size_mb} MB)`;
      opt.dataset.name = f.name;
      opt.dataset.size = f.size_mb;
      select.appendChild(opt);
    });

    select.addEventListener("change", () => {
      const opt = select.options[select.selectedIndex];
      document.getElementById("infoSize").textContent = opt.dataset.size + " MB";
      loadPLY(select.value, opt.dataset.name);
    });

    // Auto-load first (prefer gaussians.ply)
    const preferred = plyFiles.find(f => f.name === "gaussians.ply") || plyFiles[0];
    select.value = preferred.url;
    document.getElementById("infoSize").textContent = preferred.size_mb + " MB";
    loadPLY(preferred.url, preferred.name);

  } catch (e) {
    document.getElementById("loadingText").textContent = "Error fetching exports: " + e.message;
  }
}

// Fullscreen
document.getElementById("btnFullscreen").addEventListener("click", () => {
  const el = document.getElementById("viewerContainer");
  if (document.fullscreenElement) document.exitFullscreen();
  else el.requestFullscreen();
});

init();
</script>
</body>
</html>
