<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Universal 3D Viewer</title>
    <style>
        #viewer {
            width: 900px;
            height: 700px;
            border: 1px solid #ccc;
            margin: 20px auto;
            display: block;
        }
        #upload {
            margin: 20px auto;
            display: block;
        }
    </style>
</head>
<body>
    <h2 style="text-align:center">Universal 3D Viewer (PLY, OBJ, GLTF, Point Clouds)</h2>
    <input id="upload" type="file" accept=".ply,.obj,.gltf,.glb,.pcd,.xyz,.txt" />
    <div id="viewer"></div>
    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.153.0/build/three.module.js';
        import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.153.0/examples/jsm/controls/OrbitControls.js';
        import { PLYLoader } from 'https://cdn.jsdelivr.net/npm/three@0.153.0/examples/jsm/loaders/PLYLoader.js';
        import { OBJLoader } from 'https://cdn.jsdelivr.net/npm/three@0.153.0/examples/jsm/loaders/OBJLoader.js';
        import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.153.0/examples/jsm/loaders/GLTFLoader.js';

        const container = document.getElementById('viewer');
        let scene, camera, renderer, controls;

        function initScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf0f0f0);
            camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.01, 1000);
            camera.position.set(0, 0, 2);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.innerHTML = '';
            container.appendChild(renderer.domElement);
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(1, 1, 1).normalize();
            scene.add(light);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        function loadPLY(file) {
            const loader = new PLYLoader();
            const reader = new FileReader();
            reader.onload = function(e) {
                const geometry = loader.parse(e.target.result);
                geometry.computeVertexNormals();
                let object;
                if (geometry.index === null) {
                    // Point cloud
                    object = new THREE.Points(geometry, new THREE.PointsMaterial({ size: 0.01, vertexColors: true }));
                } else {
                    // Mesh
                    object = new THREE.Mesh(geometry, new THREE.MeshStandardMaterial({ vertexColors: true }));
                }
                scene.add(object);
            };
            reader.readAsArrayBuffer(file);
        }

        function loadOBJ(file) {
            const loader = new OBJLoader();
            const reader = new FileReader();
            reader.onload = function(e) {
                const object = loader.parse(e.target.result);
                scene.add(object);
            };
            reader.readAsText(file);
        }

        function loadGLTF(file) {
            const loader = new GLTFLoader();
            const reader = new FileReader();
            reader.onload = function(e) {
                loader.parse(e.target.result, '', function(gltf) {
                    scene.add(gltf.scene);
                });
            };
            reader.readAsArrayBuffer(file);
        }

        function loadXYZ(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const lines = e.target.result.split('\n');
                const positions = [];
                for (let line of lines) {
                    const parts = line.trim().split(/\s+/);
                    if (parts.length >= 3) {
                        positions.push(parseFloat(parts[0]), parseFloat(parts[1]), parseFloat(parts[2]));
                    }
                }
                const geometry = new THREE.BufferGeometry();
                geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
                const points = new THREE.Points(geometry, new THREE.PointsMaterial({ size: 0.01, color: 0x0077ff }));
                scene.add(points);
            };
            reader.readAsText(file);
        }

        document.getElementById('upload').addEventListener('change', function(e) {
            if (!e.target.files.length) return;
            initScene();
            const file = e.target.files[0];
            const ext = file.name.split('.').pop().toLowerCase();
            if (ext === 'ply') {
                loadPLY(file);
            } else if (ext === 'obj') {
                loadOBJ(file);
            } else if (ext === 'gltf' || ext === 'glb') {
                loadGLTF(file);
            } else if (ext === 'xyz' || ext === 'pcd' || ext === 'txt') {
                loadXYZ(file);
            } else {
                alert('Unsupported file format: ' + ext);
            }
            animate();
        });
    </script>
</body>
</html>
